<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam-in-Mind 知识树展示</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                 "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: #f7f8fa;
    color: #1f2328;
    line-height: 1.6;
  }
  .wrap {
    max-width: 780px;
    margin: 0 auto;
    padding: 4rem 1.5rem 3rem;
  }
  header h1 {
    margin: 0 0 .5rem;
    font-size: 2rem;
    letter-spacing: .02em;
  }
  header p.tagline {
    margin: 0 0 2.5rem;
    color: #57606a;
    font-size: 1.05rem;
  }
  .intro {
    background: #fff;
    border: 1px solid #d0d7de;
    border-radius: 8px;
    padding: 1.2rem 1.4rem;
    margin-bottom: 2.5rem;
    font-size: .95rem;
    color: #24292f;
  }
  .intro p { margin: .3rem 0; }
  h2.section-title {
    font-size: 1.05rem;
    color: #57606a;
    font-weight: 600;
    margin: 0 0 1rem;
    text-transform: uppercase;
    letter-spacing: .08em;
  }
  .cards {
    display: grid;
    gap: 1rem;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  }
  .card {
    display: block;
    background: #fff;
    border: 1px solid #d0d7de;
    border-radius: 8px;
    padding: 1.4rem 1.5rem;
    text-decoration: none;
    color: inherit;
    transition: border-color .15s, transform .15s, box-shadow .15s;
  }
  .card:hover {
    border-color: #0969da;
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(9, 105, 218, .12);
  }
  .card h3 {
    margin: 0 0 .4rem;
    font-size: 1.15rem;
    color: #0969da;
  }
  .card p {
    margin: 0;
    font-size: .9rem;
    color: #57606a;
  }
  footer {
    margin-top: 3rem;
    padding-top: 1.5rem;
    border-top: 1px solid #d0d7de;
    font-size: .85rem;
    color: #57606a;
    text-align: center;
  }
  footer a {
    color: #0969da;
    text-decoration: none;
  }
  footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Exam-in-Mind 知识树展示</h1>
    <p class="tagline">面向考试科目的学习智能体 —— 自动生成的分层知识树</p>
  </header>

  <div class="intro">
    <p>本页展示由 <strong>Exam-in-Mind</strong> 自动生成的考试知识树成果。</p>
    <p>输入考试名称,程序联网查询官方考纲、构建三级知识树(章 → 节 → 知识点),为每个叶子知识点生成定义、公式与易错点,最终输出为可离线浏览的 MkDocs 站点。</p>
  </div>

  <h2 class="section-title">已生成科目</h2>
  <div class="cards">
    <a class="card" href="./ap_calculus_bc/">
      <h3>AP Calculus BC</h3>
      <p>微积分 BC · 中文版 · 10 个 Unit</p>
    </a>
    <a class="card" href="./sat_math/">
      <h3>SAT Math</h3>
      <p>SAT 数学 · 中文版</p>
    </a>
  </div>

  <footer>
    源码与开发日志 · <a href="https://github.com/Joyson-Zhang/Exam-in-Mind">github.com/Joyson-Zhang/Exam-in-Mind</a>
  </footer>
</div>
</body>
</html>
